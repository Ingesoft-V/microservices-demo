services:
  postgres:
    image: postgres:13
    container_name: voting-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-okteto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okteto}
      POSTGRES_DB: ${POSTGRES_DB:-votes}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okteto}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voting-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: voting-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - voting-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: voting-kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:${KAFKA_INTERNAL_PORT:-29092}"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - voting-network

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: voting-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c '
        kafka-topics --create --topic ${KAFKA_TOPIC:-votes} --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor 1 --bootstrap-server kafka:${KAFKA_INTERNAL_PORT:-29092} --if-not-exists &&
        echo "✅ Kafka topic ${KAFKA_TOPIC:-votes} created successfully"
      '
    networks:
      - voting-network

  vote:
    build:
      context: ./vote
      dockerfile: Dockerfile
    container_name: voting-vote
    ports:
      - "${VOTE_EXTERNAL_PORT:-5000}:8080"
    environment:
      KAFKA_BROKERS: kafka:${KAFKA_INTERNAL_PORT:-29092}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-okteto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okteto}
      POSTGRES_DB: ${POSTGRES_DB:-votes}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-votes}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - voting-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: voting-worker
    environment:
      KAFKA_BROKERS: kafka:${KAFKA_INTERNAL_PORT:-29092}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-okteto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okteto}
      POSTGRES_DB: ${POSTGRES_DB:-votes}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-votes}
      KAFKA_GROUP: ${KAFKA_GROUP:-voting-group}
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - voting-network
    restart: unless-stopped

  result:
    build:
      context: ./result
      dockerfile: Dockerfile
    container_name: voting-result
    ports:
      - "${RESULT_EXTERNAL_PORT:-5001}:80"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-okteto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okteto}
      POSTGRES_DB: ${POSTGRES_DB:-votes}
      RESULT_POLL_INTERVAL_MS: ${RESULT_POLL_INTERVAL_MS:-1000}
      RESULT_DB_RETRY_TIMES: ${RESULT_DB_RETRY_TIMES:-1000}
      RESULT_DB_RETRY_INTERVAL_MS: ${RESULT_DB_RETRY_INTERVAL_MS:-1000}
      PORT: 80
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voting-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  voting-network:
    driver: bridge
