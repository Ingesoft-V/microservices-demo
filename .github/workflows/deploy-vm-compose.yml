name: Deploy App - VM (Docker Compose)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment to deploy to (used for production merge gate)'
        required: true
        default: 'preprod'
        type: choice
        options:
          - preprod
          - production
  push:
    branches: [main, production]
    paths:
      - 'docker-compose.yml'
      - '.env.example'
      - 'vote/**'
      - 'worker/**'
      - 'result/**'
      - '.github/workflows/deploy-vm-compose.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'production' && 'production' || 'preprod') }}
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'production' && 'production' || 'preprod') }}
      TARGET_VM_HOST: ${{ secrets.VM_HOST }}
      TARGET_VM_USER: ${{ secrets.VM_USER }}
      TARGET_VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
    steps:
      - name: Validate deploy secrets
        run: |
          if [ -z "$TARGET_VM_HOST" ] || [ -z "$TARGET_VM_USER" ] || [ -z "$TARGET_VM_SSH_PRIVATE_KEY" ]; then
            echo "Missing VM secrets for environment: $DEPLOY_ENV"
            echo "Required: VM_HOST, VM_USER and VM_SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Deploy via SSH in VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_VM_HOST }}
          username: ${{ env.TARGET_VM_USER }}
          key: ${{ env.TARGET_VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR=/opt/microservices-demo
            BRANCH_NAME=${{ env.DEPLOY_BRANCH }}
            REPO_URL=https://github.com/${{ github.repository }}.git

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sh
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl restart docker
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo rm -rf "$APP_DIR"
              sudo mkdir -p "$APP_DIR"
              sudo chown -R $USER:$USER "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            docker compose down --remove-orphans || true

            # These services use fixed container names. If a previous deployment ran from a different
            # directory/project, docker compose won't be able to clean them up automatically.
            for cname in \
              voting-postgres \
              voting-zookeeper \
              voting-kafka \
              voting-kafka-init \
              voting-vote \
              voting-worker \
              voting-result
            do
              docker rm -f "${cname}" >/dev/null 2>&1 || true
            done

            docker compose up -d --build
            docker image prune -f
