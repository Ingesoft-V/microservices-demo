name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vote-build:
    name: vote-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Build vote service
        working-directory: vote
        run: mvn -B -DskipTests package

  worker-build:
    name: worker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: worker/go.mod

      - name: Download dependencies
        working-directory: worker
        run: go mod download

      - name: Generate go.sum entries
        working-directory: worker
        run: go mod tidy

      - name: Build worker service
        working-directory: worker
        run: go build ./...

  result-build:
    name: result-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: result
        run: npm install --no-audit --no-fund

      - name: Validate Node syntax
        working-directory: result
        run: node --check server.js
