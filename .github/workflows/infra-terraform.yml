name: Infra - Terraform

on:
  pull_request:
    branches: [main, production]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra-terraform.yml'
  push:
    branches: [main, production]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
      environment:
        description: 'Target environment'
        required: true
        default: 'preprod'
        type: choice
        options:
          - preprod
          - prod

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform-check:
    name: terraform-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check terraform directory
        id: tfdir
        run: |
          if [ -d "infra/terraform" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip check if infra/terraform does not exist
        if: steps.tfdir.outputs.exists == 'false'
        run: echo "infra/terraform not found in this branch. Skipping terraform checks."

      - name: Setup Terraform
        if: steps.tfdir.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init (no backend)
        if: steps.tfdir.outputs.exists == 'true'
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform Format Check
        if: steps.tfdir.outputs.exists == 'true'
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: steps.tfdir.outputs.exists == 'true'
        working-directory: infra/terraform
        run: terraform validate

  terraform-plan:
    name: terraform-plan
    runs-on: ubuntu-latest
    needs: terraform-check
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
      TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RG }}
      TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check terraform directory
        id: tfdir
        run: |
          if [ -d "infra/terraform" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip plan if infra/terraform does not exist
        if: steps.tfdir.outputs.exists == 'false'
        run: echo "infra/terraform not found in this branch. Skipping terraform plan."

      - name: Setup Terraform
        if: steps.tfdir.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Select tfvars by branch/input
        if: steps.tfdir.outputs.exists == 'true'
        id: tfvars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "file=${{ inputs.environment }}.tfvars" >> "$GITHUB_OUTPUT"
            echo "state_key=${{ inputs.environment }}.tfstate" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.base_ref }}" = "production" ]; then
            echo "file=prod.tfvars" >> "$GITHUB_OUTPUT"
            echo "state_key=prod.tfstate" >> "$GITHUB_OUTPUT"
          else
            echo "file=preprod.tfvars" >> "$GITHUB_OUTPUT"
            echo "state_key=preprod.tfstate" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip plan if required secrets are not configured
        if: steps.tfdir.outputs.exists == 'true' && (env.ARM_CLIENT_ID == '' || env.ARM_CLIENT_SECRET == '' || env.ARM_SUBSCRIPTION_ID == '' || env.ARM_TENANT_ID == '' || env.TF_VAR_ssh_public_key == '' || env.TF_STATE_RESOURCE_GROUP == '' || env.TF_STATE_STORAGE_ACCOUNT == '' || env.TF_STATE_CONTAINER == '')
        run: echo "Required secrets not configured (ARM_*, VM_SSH_PUBLIC_KEY, TF_STATE_RG, TF_STATE_STORAGE_ACCOUNT, TF_STATE_CONTAINER). Skipping terraform plan."

      - name: Terraform Init
        if: steps.tfdir.outputs.exists == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_CLIENT_SECRET != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_TENANT_ID != '' && env.TF_VAR_ssh_public_key != '' && env.TF_STATE_RESOURCE_GROUP != '' && env.TF_STATE_STORAGE_ACCOUNT != '' && env.TF_STATE_CONTAINER != ''
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=$TF_STATE_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_STATE_CONTAINER" \
            -backend-config="key=${{ steps.tfvars.outputs.state_key }}"

      - name: Terraform Plan
        if: steps.tfdir.outputs.exists == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_CLIENT_SECRET != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_TENANT_ID != '' && env.TF_VAR_ssh_public_key != '' && env.TF_STATE_RESOURCE_GROUP != '' && env.TF_STATE_STORAGE_ACCOUNT != '' && env.TF_STATE_CONTAINER != ''
        working-directory: infra/terraform
        run: terraform plan -input=false -var-file=${{ steps.tfvars.outputs.file }}

  terraform-apply-preprod:
    name: terraform-apply-preprod
    runs-on: ubuntu-latest
    needs: terraform-check
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'preprod')

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
      TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RG }}
      TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check terraform directory
        id: tfdir
        run: |
          if [ -d "infra/terraform" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip apply if infra/terraform does not exist
        if: steps.tfdir.outputs.exists == 'false'
        run: echo "infra/terraform not found in this branch. Skipping terraform apply preprod."

      - name: Setup Terraform
        if: steps.tfdir.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Skip apply if required secrets are not configured
        if: steps.tfdir.outputs.exists == 'true' && (env.ARM_CLIENT_ID == '' || env.ARM_CLIENT_SECRET == '' || env.ARM_SUBSCRIPTION_ID == '' || env.ARM_TENANT_ID == '' || env.TF_VAR_ssh_public_key == '' || env.TF_STATE_RESOURCE_GROUP == '' || env.TF_STATE_STORAGE_ACCOUNT == '' || env.TF_STATE_CONTAINER == '')
        run: echo "Required secrets not configured (ARM_*, VM_SSH_PUBLIC_KEY, TF_STATE_RG, TF_STATE_STORAGE_ACCOUNT, TF_STATE_CONTAINER). Skipping terraform apply preprod."

      - name: Terraform Init
        if: steps.tfdir.outputs.exists == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_CLIENT_SECRET != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_TENANT_ID != '' && env.TF_VAR_ssh_public_key != '' && env.TF_STATE_RESOURCE_GROUP != '' && env.TF_STATE_STORAGE_ACCOUNT != '' && env.TF_STATE_CONTAINER != ''
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=$TF_STATE_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_STATE_CONTAINER" \
            -backend-config="key=preprod.tfstate"

      - name: Terraform Apply (preprod)
        if: steps.tfdir.outputs.exists == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_CLIENT_SECRET != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_TENANT_ID != '' && env.TF_VAR_ssh_public_key != '' && env.TF_STATE_RESOURCE_GROUP != '' && env.TF_STATE_STORAGE_ACCOUNT != '' && env.TF_STATE_CONTAINER != ''
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve -var-file=preprod.tfvars

  terraform-apply-prod:
    name: terraform-apply-prod
    runs-on: ubuntu-latest
    needs: terraform-check
    if: (github.event_name == 'push' && github.ref == 'refs/heads/production') || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'prod')
    environment: production

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
      TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RG }}
      TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check terraform directory
        id: tfdir
        run: |
          if [ -d "infra/terraform" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip apply if infra/terraform does not exist
        if: steps.tfdir.outputs.exists == 'false'
        run: echo "infra/terraform not found in this branch. Skipping terraform apply prod."

      - name: Setup Terraform
        if: steps.tfdir.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Skip apply if required secrets are not configured
        if: steps.tfdir.outputs.exists == 'true' && (env.ARM_CLIENT_ID == '' || env.ARM_CLIENT_SECRET == '' || env.ARM_SUBSCRIPTION_ID == '' || env.ARM_TENANT_ID == '' || env.TF_VAR_ssh_public_key == '' || env.TF_STATE_RESOURCE_GROUP == '' || env.TF_STATE_STORAGE_ACCOUNT == '' || env.TF_STATE_CONTAINER == '')
        run: echo "Required secrets not configured (ARM_*, VM_SSH_PUBLIC_KEY, TF_STATE_RG, TF_STATE_STORAGE_ACCOUNT, TF_STATE_CONTAINER). Skipping terraform apply prod."

      - name: Terraform Init
        if: steps.tfdir.outputs.exists == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_CLIENT_SECRET != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_TENANT_ID != '' && env.TF_VAR_ssh_public_key != '' && env.TF_STATE_RESOURCE_GROUP != '' && env.TF_STATE_STORAGE_ACCOUNT != '' && env.TF_STATE_CONTAINER != ''
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=$TF_STATE_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_STATE_CONTAINER" \
            -backend-config="key=prod.tfstate"

      - name: Terraform Apply (prod)
        if: steps.tfdir.outputs.exists == 'true' && env.ARM_CLIENT_ID != '' && env.ARM_CLIENT_SECRET != '' && env.ARM_SUBSCRIPTION_ID != '' && env.ARM_TENANT_ID != '' && env.TF_VAR_ssh_public_key != '' && env.TF_STATE_RESOURCE_GROUP != '' && env.TF_STATE_STORAGE_ACCOUNT != '' && env.TF_STATE_CONTAINER != ''
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve -var-file=prod.tfvars
