apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  namespace: voting-preprod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: REPLACE_WITH_ACR/result:latest
          ports:
            - containerPort: 80
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: RESULT_POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RESULT_POLL_INTERVAL_MS
            - name: RESULT_DB_RETRY_TIMES
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RESULT_DB_RETRY_TIMES
            - name: RESULT_DB_RETRY_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RESULT_DB_RETRY_INTERVAL_MS
            - name: PORT
              value: "80"
---
apiVersion: v1
kind: Service
metadata:
  name: result
  namespace: voting-preprod
spec:
  type: LoadBalancer
  selector:
    app: result
  ports:
    - port: 80
      targetPort: 80
